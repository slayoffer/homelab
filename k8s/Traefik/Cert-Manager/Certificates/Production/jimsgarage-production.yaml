---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: devcraft # change to your domain
  namespace: traefik # add to traefik namespace so it can use it (you DO NOT need it in each app namespace!!!)
spec:
  secretName: devcraft-tls # change to your secretname
  issuerRef:
    name: letsencrypt-production
    kind: ClusterIssuer
  commonName: "*.devcraft.app" # change to your domain
  dnsNames:
  - "*.devcraft.app" # change to your domain
  - devcraft.app # change to your domain
